<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARscape - Mobile Gastronomy Portal</title>
    
    <!-- Tailwind CSS for high-fidelity responsive utility layout systems -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Google Fonts pairing: Plus Jakarta Sans for clean modern tech UI -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google <model-viewer> for lightweight, fast 3D native web rendering -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            obsidian: '#07090e',       /* Deep obsidian luxury black */
                            cardBg: '#0e121d',         /* Glassmorphic elevated containers */
                            accent: '#ca8a04',         /* Burnished champagne gold accent */
                            accentLight: '#fcd34d',    /* Rich gold highlight tone */
                            mutedText: '#64748b'       /* Secondary slate grey metadata */
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Smooth cubic bezier curve matching native Apple Spring physics */
        .cinematic-ease {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Custom scrollbar stripping for touchscreen swiping layouts */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphic panel styling for expensive feel */
        .glass-panel {
            background: rgba(14, 18, 29, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Ambient glowing golden drop shadow */
        .glow-gold {
            box-shadow: 0 0 30px rgba(202, 138, 4, 0.15);
        }
        
        /* Simulated high-fidelity physical smartphone container frame */
        .phone-frame {
            border: 14px solid #1e293b;
            border-radius: 48px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.8);
            background-color: #07090e;
            overflow: hidden;
            width: 390px;
            height: 820px;
            position: relative;
        }

        /* Fixed Cart Bounce Keyframes: uses relative vertical translation instead of absolute translation percentages to prevent shifting */
        @keyframes cartBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-10px) scale(1.15) rotate(-5deg); }
            50% { transform: translateY(4px) scale(0.9) rotate(3deg); }
            80% { transform: translateY(-2px) scale(1.03); }
        }
        .animate-cart-bounce {
            animation: cartBounce 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Flight flyer container for path calculations */
        .flight-flyer {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #ca8a04;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease-out, width 0.5s ease, height 0.5s ease;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen py-6 px-4 flex flex-col items-center justify-center gap-6 overflow-x-hidden antialiased select-none">

    <!-- MAIN SMARTPHONE WIREFRAME CONTAINER -->
    <div class="phone-frame cinematic-ease relative flex flex-col justify-between">
        
        <!-- Physical camera notch overlay -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-[#1e293b] rounded-b-2xl z-50 flex items-center justify-center">
            <span class="w-3.5 h-3.5 rounded-full bg-black/60 border border-white/5"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-blue-900/40 ml-2"></span>
        </div>

        <!-- Custom Toast Notification Box Overlay (No-Alert Guardrail) -->
        <div id="app-toast-box" class="absolute top-10 left-4 right-4 z-50 bg-[#1e1e2d] border border-[#ca8a04]/40 p-3 rounded-xl shadow-2xl opacity-0 pointer-events-none translate-y-[-20px] cinematic-ease flex items-center gap-2.5">
            <i id="toast-icon" class="fa-solid fa-circle-info text-brand-accentLight text-sm"></i>
            <span id="toast-message" class="text-[10px] text-slate-200 font-semibold leading-tight">Toast message context...</span>
        </div>

        <!-- CENTERED FLOATING ACTION BUTTON (THE MAIN PORTAL CART TRIGGER - POSITIONED IN TRUE PHONE CENTER WITH FIXED WIDTH LOCK) -->
        <div id="floating-cart-container" class="absolute bottom-5 left-1/2 -translate-x-1/2 z-50 w-14 h-14">
            <button id="floating-cart-btn" onclick="toggleViewToCheckout()" class="w-full h-full rounded-full bg-gradient-to-r from-brand-accent to-yellow-600 hover:brightness-110 active:scale-95 text-black flex items-center justify-center transition-all shadow-lg shadow-yellow-500/20 border-4 border-brand-obsidian relative">
                <i class="fa-solid fa-shopping-cart text-lg"></i>
                <!-- Cart item count indicator tag -->
                <span id="cart-floating-badge" class="absolute -top-1 -right-1 bg-
