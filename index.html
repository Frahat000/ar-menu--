<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Food Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; }
        h1 { margin-top: 20px; color: #333; }
        model-viewer {
            width: 100%;
            height: 80vh;
            background-color: #ffffff;
            --poster-color: transparent;
        }
        .ar-button {
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: -50px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>Our 3D Menu</h1>

    <model-viewer 
        src="https://miqyfkrxyxywnkavvnkn.supabase.co/storage/v1/object/public/models/Food%20-%20Homemade%20burger.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        poster="poster.webp" 
        shadow-intensity="1" 
        auto-rotate>
        
        <button slot="ar-button" class="ar-button">
            👋 View in your room
        </button>
    </model-viewer>

    <p style="padding: 20px;">Point your camera at a flat surface to see the food!</p>

</body>
</html>
