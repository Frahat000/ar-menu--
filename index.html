<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation AR | Interactive 3D Menu</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="env.js"></script> 
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --brand-gold: #D4AF37; --bg-light: #fdfdfd; --text-main: #1a1a1a; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-light); color: var(--text-main); }
        header { text-align: center; padding: 60px 20px 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .menu-card { background: #fff; border-radius: 30px; padding: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; }
        model-viewer { width: 100%; height: 300px; background-color: #fafafa; border-radius: 20px; }
        .info { padding: 20px 10px; }
        h3 { margin: 0; font-size: 1.5rem; }
        .price { font-weight: 800; color: var(--brand-gold); font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <h1>The 3D Bistro</h1>
        <p>Experience your meal before it arrives.</p>
    </header>

    <div id="menu-container" class="menu-grid">
        </div>

    <script>
        // SMART CONFIG: Checks if 'config' exists from env.js
        const url = (typeof config !== 'undefined') ? config.SUPABASE_URL : '';
        const key = (typeof config !== 'undefined') ? config.SUPABASE_KEY : '';

        if (!url || !key) {
            console.error("Supabase credentials missing. Ensure env.js is present or keys are set.");
        }

        const _supabase = supabase.createClient(url, key);

        async function getMenu() {
            const container = document.getElementById('menu-container');
            const { data, error } = await _supabase.from('menu_items').select('*').eq('is_active', true);

            if (error) {
                container.innerHTML = `<p>Error connecting to database.</p>`;
                return;
            }

            container.innerHTML = ''; 
            data.forEach(item => {
                container.innerHTML += `
                    <div class="menu-card">
                        <model-viewer src="${item.model_url}" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1"></model-viewer>
                        <div class="info">
                            <h3>${item.name}</h3>
                            <p>${item.description}</p>
                            <span class="price">$${parseFloat(item.price).toFixed(2)}</span>
                        </div>
                    </div>`;
            });
        }

        getMenu();
    </script>
</body>
</html>
