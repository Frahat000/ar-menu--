<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation AR | Interactive 3D Menu</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="env.js"></script> <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* Your existing CSS stays here */
        :root { --brand-gold: #D4AF37; --bg-light: #fdfdfd; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-light); }
        /* ... (Keep your original styles) ... */
    </style>
</head>
<body>
    <header>
        <h1>The 3D Bistro</h1>
        <p>Experience your meal before it arrives.</p>
    </header>
    <div id="menu-container" class="menu-grid"></div>

    <script>
        // Use the config object from env.js
        const _supabase = supabase.createClient(config.SUPABASE_URL, config.SUPABASE_KEY);

        async function getMenu() {
            const { data, error } = await _supabase.from('menu_items').select('*').eq('is_active', true);
            const container = document.getElementById('menu-container');
            if (error) return;
            container.innerHTML = ''; 
            data.forEach(item => {
                container.innerHTML += `
                    <div class="menu-card">
                        <model-viewer src="${item.model_url}" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate></model-viewer>
                        <div class="info">
                            <h3>${item.name}</h3>
                            <p class="desc">${item.description}</p>
                            <div class="footer"><span class="price">$${item.price}</span></div>
                        </div>
                    </div>`;
            });
        }
        getMenu();
    </script>
</body>
</html>
