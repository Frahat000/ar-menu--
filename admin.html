<!DOCTYPE html>
<html lang="en">
<head>
    <title>Innovation AR | Manager Dashboard</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="env.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    </head>
<body>
    <script>
        // Security Gate
        if (sessionStorage.getItem("isAdmin") !== "true") { window.location.href = "login.html"; }

        const _supabase = supabase.createClient(config.SUPABASE_URL, config.SUPABASE_KEY);

        async function addItem(e) {
            e.preventDefault();
            const newItem = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                model_url: document.getElementById('modelUrl').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value
            };
            const { error } = await _supabase.from('menu_items').insert([newItem]);
            if (error) alert("Error!"); else location.reload();
        }
    </script>
    </body>
</html>
