<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bistro Manager Dashboard</title>
    <!-- 1. This loads the Supabase "engine" -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f4f7f6; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #1a1a1a; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #000; color: white; border: none; border-radius: 6px; margin-top: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Add New Item</h2>
    <!-- 2. The Form UI -->
    <form id="menu-form">
        <label>Item Name</label>
        <input type="text" id="name" placeholder="e.g. Double Cheeseburger" required>

        <label>Price ($)</label>
        <input type="number" step="0.01" id="price" placeholder="9.99" required>

        <label>3D Model URL (.glb)</label>
        <input type="text" id="modelUrl" placeholder="Link from Supabase Storage" required>

        <button type="submit" id="submitBtn">Save to Menu</button>
    </form>
</div>

<script>
    // 3. The Logic (Now inside script tags where it belongs!)
    const SUPABASE_URL = 'https://miqyfkrxyxywnkavvnkn.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_bFsHvmYFPyTOIUdIHJYmjA_8xm8NVP0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('menu-form');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Saving...";
        btn.disabled = true;

        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        const modelUrl = document.getElementById('modelUrl').value;

        const { data, error } = await _supabase
            .from('menu_items')
            .insert([
                { name: name, price: price, model_url: modelUrl, is_active: true }
            ]);

        if (error) {
            alert("Error adding item: " + error.message);
            btn.innerText = "Save to Menu";
            btn.disabled = false;
        } else {
            alert("Success! Item added to the menu.");
            form.reset();
            btn.innerText = "Save to Menu";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
