<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bistro Manager Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px; background: #f4f7f6; color: #333; }
        
        /* Top Navigation / Header */
        .admin-header { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto 20px; }
        .logout-btn { background: #eee; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .logout-btn:hover { background: #ffebeb; color: #ff4d4d; }

        .container { max-width: 800px; margin: auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        
        /* Form Styling */
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); height: fit-content; }
        h2 { margin-top: 0; font-size: 1.2rem; font-weight: 800; color: #1a1a1a; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-family: inherit; background: #fafafa; }
        
        #submitBtn { width: 100%; padding: 15px; background: #000; color: white; border: none; border-radius: 12px; margin-top: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #submitBtn:hover { background: #333; transform: translateY(-2px); }

        /* Table Styling */
        .inventory-list { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.8rem; color: #999; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        td { padding: 15px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        
        .delete-btn { color: #ff4d4d; background: none; border: 1px solid #ff4d4d; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .delete-btn:hover { background: #ff4d4d; color: white; }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="admin-header">
    <h1 style="font-size: 1.2rem; margin:0;">Bistro Admin</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">
    <div class="card">
        <h2>Add Menu Item</h2>
        <form id="menu-form">
            <label>Category</label>
            <select id="category">
                <option value="Main Course">Main Course</option>
                <option value="Dessert">Dessert</option>
                <option value="Drinks">Drinks</option>
            </select>

            <label>Item Name</label>
            <input type="text" id="name" placeholder="e.g. Lava Cake" required>

            <label>Description</label>
            <textarea id="description" rows="3" placeholder="Description..." required></textarea>

            <label>Price ($)</label>
            <input type="number" step="0.01" id="price" placeholder="9.99" required>

            <label>3D Model URL</label>
            <input type="text" id="modelUrl" placeholder="Supabase Public URL" required>

            <button type="submit" id="submitBtn">Save to Menu</button>
        </form>
    </div>

    <div class="inventory-list">
        <h2>Live Inventory</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventory-body"></tbody>
        </table>
    </div>
</div>

<script>
    // --- 1. SECURITY GATEKEEPER ---
    (function() {
        const isAdmin = sessionStorage.getItem("isAdmin");
        if (isAdmin !== "true") {
            window.location.href = "login.html";
        }
    })();

    function logout() {
        sessionStorage.removeItem("isAdmin");
        window.location.href = "login.html";
    }

    // --- 2. SUPABASE SETUP ---
    const SUPABASE_URL = 'https://miqyfkrxyxywnkavvnkn.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_bFsHvmYFPyTOIUdIHJYmjA_8xm8NVP0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('menu-form');
    const inventoryBody = document.getElementById('inventory-body');

    // --- FETCH & DISPLAY LOGIC ---
    async function fetchInventory() {
        const { data, error } = await _supabase
            .from('menu_items')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return console.error(error);

        inventoryBody.innerHTML = '';
        data.forEach(item => {
            inventoryBody.innerHTML += `
                <tr>
                    <td>
                        <strong>${item.name}
