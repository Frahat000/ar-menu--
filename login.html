<!DOCTYPE html>
<html lang="en">
<head>
    <title>Innovation AR | Staff Login</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Manager Access</h2>
        <input type="password" id="accessKey" placeholder="Enter Manager Key">
        <button onclick="checkAccess()">Login</button>
    </div>
    <script>
        function checkAccess() {
            const key = document.getElementById('accessKey').value;
            if (key === "admin123") { // Replace with your secret key
                sessionStorage.setItem("isAdmin", "true");
                window.location.href = "admin.html";
            } else {
                alert("Invalid Access Key");
            }
        }
    </script>
</body>
</html>
