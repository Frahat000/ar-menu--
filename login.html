<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bistro Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #000; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Manager Access</h2>
        <input type="password" id="passkey" placeholder="Enter Secret Key">
        <button onclick="checkLogin()">Login</button>
        <p id="error" style="color: red; font-size: 0.8rem; display: none;">Access Denied</p>
    </div>

    <script>
        function checkLogin() {
            const secret = "BISTRO2026"; // CHANGE THIS TO YOUR SECRET PASSWORD
            const input = document.getElementById('passkey').value;
            
            if(input === secret) {
                // Give them the "Key" for this session
                sessionStorage.setItem("isAdmin", "true");
                window.location.href = "admin.html";
            } else {
                document.getElementById('error').style.display = "block";
            }
        }
    </script>
</body>
</html>
